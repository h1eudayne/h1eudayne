name: Update README trophy
on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:      
  push: {branches: ["master", "main"]} 
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Create assets directory
        run: mkdir -p assets
      
      - name: Generate trophy card
        uses: soulteary/github-profile-trophy-action@v1.0.0
        with:
          options: 'username=h1eudayne&theme=dracula&column=7'
          path: assets/trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Commit trophy card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/trophy.svg
          git commit -m "Update README trophy" || exit 0
          git push
